<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソシャゲアーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a12;--bg2:#12121e;--bg3:#1a1a2e;
  --surface:#1e1e32;--surface2:#252540;
  --border:#2a2a4a;--border2:#3a3a5a;
  --text:#e8e8f0;--text2:#9898b8;--text3:#6060a0;
  --accent:#ff6b35;--accent2:#ff9f1c;--accentbg:rgba(255,107,53,0.12);
  --blue:#4a9eff;--bluebg:rgba(74,158,255,0.1);
  --green:#4ade80;--greenbg:rgba(74,222,128,0.1);
  --pink:#f472b6;--pinkbg:rgba(244,114,182,0.1);
  --purple:#a78bfa;--purplebg:rgba(167,139,250,0.1);
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}

.site-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.site-logo{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.site-subtitle{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:0.05em}
.header-stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-num{font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:0.05em}

.controls{padding:16px 24px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:"⌕";position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.2s;font-family:inherit;white-space:nowrap}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--accentbg);border-color:var(--accent);color:var(--accent)}
.sort-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text2);font-family:inherit;font-size:12px;outline:none;cursor:pointer}

.main-content{padding:20px 24px}
.result-count{font-size:12px;color:var(--text3);margin-bottom:16px}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.game-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative}
.game-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.card-visual{height:140px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-badge-year{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--text2)}
.card-badge-status{position:absolute;top:8px;left:8px;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700}
.status-active{background:var(--greenbg);color:var(--green);border:1px solid var(--green)}
.status-ended{background:rgba(100,100,130,0.2);color:var(--text3);border:1px solid var(--text3)}
.card-body{padding:14px}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.4}
.card-maker{font-size:11px;color:var(--text3);margin-bottom:8px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.tag{font-size:10px;padding:2px 8px;border-radius:10px}
.tag-genre{background:var(--purplebg);color:var(--purple);border:1px solid rgba(167,139,250,0.3)}
.tag-platform{background:var(--bluebg);color:var(--blue);border:1px solid rgba(74,158,255,0.3)}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.comment-count{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;margin:auto;overflow:hidden}
.modal-header{height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.6);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:18px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.modal-body{padding:20px 24px}
.modal-title{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:700;margin-bottom:4px}
.modal-meta{display:flex;gap:12px;font-size:12px;color:var(--text3);margin-bottom:12px;flex-wrap:wrap}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:20px}
.modal-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.comments-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;max-height:240px;overflow-y:auto}
.comment-item{background:var(--surface);border-radius:8px;padding:10px 14px}
.comment-author{font-size:11px;color:var(--text3);margin-bottom:4px}
.comment-text{font-size:13px;color:var(--text);line-height:1.6}
.comment-form{display:flex;flex-direction:column;gap:8px}
.comment-form input,.comment-form textarea{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s}
.comment-form input:focus,.comment-form textarea:focus{border-color:var(--accent)}
.comment-form textarea{resize:vertical;min-height:70px}
.submit-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s;align-self:flex-end}
.submit-btn:hover{opacity:0.85}

.admin-toggle{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:50%;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;z-index:150;transition:all 0.2s}
.admin-toggle:hover{background:var(--surface2);border-color:var(--accent)}
.admin-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:520px;margin:auto;padding:24px}
.admin-modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-col{display:flex;flex-direction:column;gap:4px}
.form-full{margin-bottom:10px;display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;color:var(--text3)}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none}
.form-input:focus{border-color:var(--accent)}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.btn-cancel{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer}
.btn-submit{background:var(--accent);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}

.vis-rpg{background:linear-gradient(135deg,#1a0a2e,#3d1a6e)}
.vis-card{background:linear-gradient(135deg,#0a1a3e,#1a3a7e)}
.vis-idol{background:linear-gradient(135deg,#2e0a2e,#6e1a6e)}
.vis-action{background:linear-gradient(135deg,#1a0a0a,#6e1a1a)}
.vis-strategy{background:linear-gradient(135deg,#0a1a0a,#1a4e1a)}
.vis-puzzle{background:linear-gradient(135deg,#0a1a2e,#1a4e6e)}
.vis-rhythm{background:linear-gradient(135deg,#2e1a0a,#6e4e1a)}
.vis-sports{background:linear-gradient(135deg,#0a2e1a,#1a6e4e)}

.game-icon-big{font-size:52px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-logo">ソシャゲアーカイブ</div>
    <div class="site-subtitle">2010年〜 日本のブラウザ・スマホ運用型ゲーム記録誌</div>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="total-count">0</div><div class="stat-label">タイトル</div></div>
    <div class="stat"><div class="stat-num" id="total-comments">0</div><div class="stat-label">思い出</div></div>
  </div>
</header>

<div class="controls">
  <div class="search-box"><input type="text" id="search" placeholder="タイトル・発売元で検索..." /></div>
  <div class="filter-group" id="genre-filters">
    <button class="filter-btn active" data-genre="all">すべて</button>
    <button class="filter-btn" data-genre="RPG">RPG</button>
    <button class="filter-btn" data-genre="カード">カード</button>
    <button class="filter-btn" data-genre="アイドル">アイドル</button>
    <button class="filter-btn" data-genre="アクション">アクション</button>
    <button class="filter-btn" data-genre="リズム">リズム</button>
    <button class="filter-btn" data-genre="ストラテジー">ストラテジー</button>
  </div>
  <select class="sort-select" id="sort-select">
    <option value="year-desc">新しい順</option>
    <option value="year-asc">古い順</option>
    <option value="title">タイトル順</option>
  </select>
</div>

<div class="main-content">
  <div class="result-count" id="result-count"></div>
  <div class="game-grid" id="game-grid"></div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header" id="modal-header">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="game-icon-big" id="modal-icon"></div>
    </div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-section-title">みんなの思い出</div>
      <div class="comments-list" id="comments-list"></div>
      <div class="comment-form">
        <input type="text" id="comment-name" placeholder="ニックネーム（任意）" />
        <textarea id="comment-text" placeholder="このゲームの思い出を書いてください..."></textarea>
        <button class="submit-btn" id="submit-comment">投稿する</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="modal-overlay" id="admin-modal">
  <div class="admin-modal">
    <h2>ゲームを追加する</h2>
    <div class="form-row">
      <div class="form-col">
        <div class="form-label">タイトル *</div>
        <input class="form-input" id="f-title" placeholder="ゲームタイトル" />
      </div>
      <div class="form-col">
        <div class="form-label">発売元 *</div>
        <input class="form-input" id="f-maker" placeholder="会社名" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <div class="form-label">リリース年</div>
        <input class="form-input" id="f-year" type="number" placeholder="2015" />
      </div>
      <div class="form-col">
        <div class="form-label">ジャンル</div>
        <input class="form-input" id="f-genre" placeholder="RPG, カードなど" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <div class="form-label">プラットフォーム</div>
        <input class="form-input" id="f-platform" placeholder="iOS/Android, ブラウザ" />
      </div>
      <div class="form-col">
        <div class="form-label">ステータス</div>
        <select class="form-input" id="f-status">
          <option value="active">サービス中</option>
          <option value="ended">サービス終了</option>
        </select>
      </div>
    </div>
    <div class="form-full">
      <div class="form-label">ゲーム概要</div>
      <textarea class="form-input" id="f-desc" rows="3" placeholder="ゲームの内容・特徴を入力..."></textarea>
    </div>
    <div class="form-full">
      <div class="form-label">キービジュアル画像URL（任意）</div>
      <input class="form-input" id="f-img" placeholder="https://..." />
    </div>
    <div class="form-btns">
      <button class="btn-cancel" id="admin-cancel">キャンセル</button>
      <button class="btn-submit" id="admin-submit">追加する</button>
    </div>
  </div>
</div>

<button class="admin-toggle" id="admin-btn" title="ゲームを追加">＋</button>

<script>
const GAMES = [
  {id:1,title:"グランブルーファンタジー",maker:"Cygames",year:2014,genre:"RPG",platform:"ブラウザ/iOS/Android",status:"active",desc:"壮大な空の世界を舞台にしたファンタジーRPG。美麗なイラストと深いストーリーで人気を博し、日本最大規模のソシャゲとなる。レイドバトルや多人数協力プレイが特徴。",vis:"vis-rpg",icon:"⚔️"},
  {id:2,title:"パズル&ドラゴンズ",maker:"GungHo Online Entertainment",year:2012,genre:"RPG",platform:"iOS/Android",status:"active",desc:"パズルとRPGを融合させた革命的なゲーム。落ちものパズルでモンスターを育て、ダンジョンを攻略する。スマホゲーム市場の形成に大きく貢献した歴史的タイトル。",vis:"vis-puzzle",icon:"🔮"},
  {id:3,title:"モンスターストライク",maker:"mixi",year:2013,genre:"アクション",platform:"iOS/Android",status:"active",desc:"弾いて飛ばす爽快なアクションRPG。最大4人でのリアルタイム協力プレイが斬新で、友達と一緒に遊ぶスタイルを確立。国内最多課金額を記録したタイトル。",vis:"vis-action",icon:"💥"},
  {id:4,title:"艦隊これくしょん",maker:"角川ゲームス/DMM",year:2013,genre:"ストラテジー",platform:"ブラウザ",status:"active",desc:"旧日本海軍の艦船を擬人化したブラウザストラテジーゲーム。艦娘と呼ばれるキャラクターを育て、艦隊を編成して出撃する。同人文化とも深く結びついた国民的IP。",vis:"vis-strategy",icon:"⚓"},
  {id:5,title:"スクールアイドルフェスティバル",maker:"KLab",year:2013,genre:"リズム",platform:"iOS/Android",status:"ended",desc:"ラブライブ！を原作とするリズムゲーム。スクールアイドルたちの楽曲に合わせてタップする音ゲー。シリーズ累計5000万DLを超えた人気タイトル。",vis:"vis-idol",icon:"🎵"},
  {id:6,title:"デレステ（アイドルマスター シンデレラガールズ スターライトステージ）",maker:"Cygames",year:2015,genre:"リズム",platform:"iOS/Android",status:"active",desc:"アイドルマスター シンデレラガールズのリズムゲーム。3Dライブ演出が圧倒的クオリティで、アイドルゲームの水準を一段引き上げた。",vis:"vis-idol",icon:"✨"},
  {id:7,title:"Fate/Grand Order",maker:"TYPE-MOON/DELiGHTWORKS",year:2015,genre:"RPG",platform:"iOS/Android",status:"active",desc:"Fate/staynight原作のスマホRPG。ターン制バトルとコマンドカードシステムが特徴。豪華なシナリオとキャラクターが世界中のファンを獲得し、売上は累計1兆円超。",vis:"vis-rpg",icon:"🗡️"},
  {id:8,title:"刀剣乱舞",maker:"DMM/ニトロプラス",year:2015,genre:"ストラテジー",platform:"ブラウザ/iOS/Android",status:"active",desc:"歴史上の刀剣を擬人化したブラウザSLG。刀剣男士と呼ばれるキャラクターを育て歴史修正主義者と戦う。ミュージカルや舞台など2.5次元展開でも大きな成功を収めた。",vis:"vis-strategy",icon:"🗡️"},
  {id:9,title:"ラブライブ！スクールアイドルフェスティバル ALL STARS",maker:"KLab",year:2019,genre:"リズム",platform:"iOS/Android",status:"ended",desc:"ラブライブ！シリーズ3グループが共演するリズムRPG。ストーリーモードが充実しており、オールスターの名の通りファン待望のタイトルとなった。",vis:"vis-idol",icon:"🌟"},
  {id:10,title:"マギアレコード",maker:"Aniplex",year:2017,genre:"RPG",platform:"iOS/Android",status:"ended",desc:"魔法少女まどか☆マギカのスピンオフRPG。独自のストーリーと美麗なキャラクターデザインが好評。アニメ化もされた。",vis:"vis-rpg",icon:"🌸"},
  {id:11,title:"バンドリ！ ガールズバンドパーティ！",maker:"Craft Egg/Bushiroad",year:2017,genre:"リズム",platform:"iOS/Android",status:"active",desc:"女性バンドが中心の音楽リズムゲーム。実際のバンド活動とメディアミックスを組み合わせた独自展開が話題に。3D演出ライブが魅力。",vis:"vis-rhythm",icon:"🎸"},
  {id:12,title:"ウマ娘 プリティーダービー",maker:"Cygames",year:2021,genre:"育成",platform:"iOS/Android",status:"active",desc:"競走馬を擬人化した育成シミュレーションゲーム。実際の名馬をモデルにしたキャラクターが人気を博し、リリース直後から社会現象に。育成の深さとライブの迫力が売り。",vis:"vis-idol",icon:"🏇"},
  {id:13,title:"プロジェクトセカイ カラフルステージ！",maker:"Colorful Palette/Crypton",year:2020,genre:"リズム",platform:"iOS/Android",status:"active",desc:"初音ミクと仮想世界をテーマにしたリズムゲーム。ボカロ楽曲と独自キャラクターの物語が融合し、若年層を中心に圧倒的な人気を誇る。",vis:"vis-rhythm",icon:"🎤"},
  {id:14,title:"ドラゴンクエストウォーク",maker:"SQUARE ENIX/Colopl",year:2019,genre:"RPG",platform:"iOS/Android",status:"active",desc:"位置情報を使ったドラクエの歩くRPG。現実の街を歩いてモンスターを倒す体験が新鮮。国民的RPGブランドの力でリリース直後から国内トップセールスを記録。",vis:"vis-rpg",icon:"🐉"},
  {id:15,title:"白猫プロジェクト",maker:"Colopl",year:2014,genre:"アクション",platform:"iOS/Android",status:"active",desc:"スライド操作で動く爽快アクションRPG。ゲームの画質クオリティでスマホゲームの常識を変えたと言われる。コロプラが特許問題で任天堂と訴訟になったことでも話題に。",vis:"vis-action",icon:"🐱"},
  {id:16,title:"タクトオーパス",maker:"DeNA/GoodSmile",year:2021,genre:"RPG",platform:"iOS/Android",status:"ended",desc:"ポスト黙示録の世界でムジクム（音楽の具現化した存在）と戦うRPG。アニメとゲームのメディアミックス展開を同時進行で行う意欲作。独特の世界観と音楽が特徴。",vis:"vis-rpg",icon:"🎼"},
];

let comments = JSON.parse(localStorage.getItem('sgarchive_comments')||'{}');
let currentGame = null;
let activeGenre = "all";
let searchQuery = "";

function saveComments(){localStorage.setItem('sgarchive_comments',JSON.stringify(comments))}
function totalComments(){return Object.values(comments).reduce((a,c)=>a+c.length,0)}

function updateStats(){
  document.getElementById("total-count").textContent=GAMES.length;
  document.getElementById("total-comments").textContent=totalComments();
}

function getVisClass(g){return g.vis||"vis-rpg"}

function renderCards(){
  const sort=document.getElementById("sort-select").value;
  let list=[...GAMES];
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    list=list.filter(g=>g.title.toLowerCase().includes(q)||g.maker.toLowerCase().includes(q)||g.desc.toLowerCase().includes(q));
  }
  if(activeGenre!=="all") list=list.filter(g=>g.genre===activeGenre);
  if(sort==="year-desc") list.sort((a,b)=>b.year-a.year);
  else if(sort==="year-asc") list.sort((a,b)=>a.year-b.year);
  else list.sort((a,b)=>a.title.localeCompare(b.title,"ja"));

  document.getElementById("result-count").textContent=`${list.length}件のタイトル`;
  const grid=document.getElementById("game-grid");
  if(list.length===0){
    grid.innerHTML='<div class="empty-state">該当するタイトルが見つかりませんでした</div>';
    return;
  }
  grid.innerHTML=list.map(g=>{
    const cc=(comments[g.id]||[]).length;
    const statusBadge=g.status==="active"
      ?'<span class="card-badge-status status-active">運営中</span>'
      :'<span class="card-badge-status status-ended">終了</span>';
    return `<div class="game-card" onclick="openGame(${g.id})">
      <div class="card-visual ${getVisClass(g)}">
        ${statusBadge}
        <span class="card-badge-year">${g.year}</span>
        <span style="font-size:44px">${g.icon}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${g.title}</div>
        <div class="card-maker">${g.maker}</div>
        <div class="card-tags">
          <span class="tag tag-genre">${g.genre}</span>
          <span class="tag tag-platform">${g.platform}</span>
        </div>
        <div class="card-desc">${g.desc}</div>
      </div>
      <div class="card-footer">
        <span class="comment-count">💬 ${cc}件の思い出</span>
        <span style="font-size:11px;color:var(--text3)">詳細を見る →</span>
      </div>
    </div>`;
  }).join("");
}

function openGame(id){
  const g=GAMES.find(x=>x.id===id);
  if(!g) return;
  currentGame=g;
  document.getElementById("modal-header").className="modal-header "+getVisClass(g);
  document.getElementById("modal-icon").textContent=g.icon;
  document.getElementById("modal-title").textContent=g.title;
  document.getElementById("modal-meta").innerHTML=`
    <span>📅 ${g.year}年</span>
    <span>🏢 ${g.maker}</span>
    <span>📱 ${g.platform}</span>
    <span>${g.status==="active"?"🟢 運営中":"⚫ サービス終了"}</span>
  `;
  document.getElementById("modal-tags").innerHTML=
    `<span class="tag tag-genre">${g.genre}</span><span class="tag tag-platform">${g.platform}</span>`;
  document.getElementById("modal-desc").textContent=g.desc;
  renderComments(g.id);
  document.getElementById("detail-modal").classList.add("open");
  document.body.style.overflow="hidden";
}

function renderComments(id){
  const list=comments[id]||[];
  const el=document.getElementById("comments-list");
  if(list.length===0){
    el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:10px 0">まだ思い出が投稿されていません。最初の一人になりましょう！</div>';
    return;
  }
  el.innerHTML=list.map(c=>`
    <div class="comment-item">
      <div class="comment-author">${c.name||"名無しさん"} · ${c.date}</div>
      <div class="comment-text">${c.text}</div>
    </div>
  `).join("");
}

document.getElementById("submit-comment").addEventListener("click",()=>{
  const text=document.getElementById("comment-text").value.trim();
  if(!text||!currentGame) return;
  const name=document.getElementById("comment-name").value.trim();
  if(!comments[currentGame.id]) comments[currentGame.id]=[];
  const now=new Date();
  comments[currentGame.id].push({name,text,date:`${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`});
  document.getElementById("comment-text").value="";
  document.getElementById("comment-name").value="";
  saveComments();
  renderComments(currentGame.id);
  updateStats();
  renderCards();
});

document.getElementById("modal-close").addEventListener("click",()=>{
  document.getElementById("detail-modal").classList.remove("open");
  document.body.style.overflow="";
});
document.getElementById("detail-modal").addEventListener("click",e=>{
  if(e.target===document.getElementById("detail-modal")){
    document.getElementById("detail-modal").classList.remove("open");
    document.body.style.overflow="";
  }
});

document.getElementById("search").addEventListener("input",e=>{
  searchQuery=e.target.value;
  renderCards();
});
document.getElementById("sort-select").addEventListener("change",renderCards);
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeGenre=btn.dataset.genre;
    renderCards();
  });
});

document.getElementById("admin-btn").addEventListener("click",()=>{
  document.getElementById("admin-modal").classList.add("open");
});
document.getElementById("admin-cancel").addEventListener("click",()=>{
  document.getElementById("admin-modal").classList.remove("open");
});
document.getElementById("admin-modal").addEventListener("click",e=>{
  if(e.target===document.getElementById("admin-modal")){
    document.getElementById("admin-modal").classList.remove("open");
  }
});
document.getElementById("admin-submit").addEventListener("click",()=>{
  const title=document.getElementById("f-title").value.trim();
  const maker=document.getElementById("f-maker").value.trim();
  if(!title||!maker){alert("タイトルと発売元は必須です");return;}
  const visMaps={"RPG":"vis-rpg","カード":"vis-card","アイドル":"vis-idol","アクション":"vis-action","リズム":"vis-rhythm","ストラテジー":"vis-strategy"};
  const genre=document.getElementById("f-genre").value.trim()||"RPG";
  const newGame={
    id:Date.now(),
    title,maker,
    year:parseInt(document.getElementById("f-year").value)||2020,
    genre,
    platform:document.getElementById("f-platform").value.trim()||"iOS/Android",
    status:document.getElementById("f-status").value,
    desc:document.getElementById("f-desc").value.trim()||"（説明なし）",
    vis:visMaps[genre]||"vis-rpg",
    icon:"🎮",
    imgUrl:document.getElementById("f-img").value.trim()
  };
  GAMES.push(newGame);
  ["f-title","f-maker","f-year","f-genre","f-platform","f-desc","f-img"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("admin-modal").classList.remove("open");
  renderCards();
  updateStats();
});

updateStats();
renderCards();
</script>
</body>
</html>
